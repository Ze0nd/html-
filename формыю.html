<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; }
        h1 { text-align: center; font-size: 1.5em; }
        input, select, textarea { width: 100%; padding: 6px; margin: 5px 0 12px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
        .inline { display: flex; gap: 15px; flex-wrap: wrap; margin: 8px 0; }
        .inline label { display: flex; align-items: center; gap: 5px; font-weight: normal; }
        button, input[type="submit"], input[type="reset"] { padding: 6px 12px; margin: 5px; cursor: pointer; }
        .btn-group { text-align: center; margin-top: 15px; }
        hr { margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Регистрация</h1>
    <form action="#" method="post" enctype="multipart/form-data">
        <input type="hidden" name="hidden" value="скрыто">

        <input type="text" name="name" placeholder="ФИО">
        <input type="password" name="pass" placeholder="Пароль">
        <textarea name="bio" rows="3" placeholder="О себе"></textarea>

        <div class="inline">
            <label><input type="radio" name="gender" value="male"> Мужской</label>
            <label><input type="radio" name="gender" value="female"> Женский</label>
        </div>

        <select name="lang">
            <option>HTML</option><option>CSS</option><option>JavaScript</option>
        </select>

        <select name="skills" size="3" multiple>
            <option>HTML</option><option>CSS</option><option>JS</option><option>Python</option>
        </select>

        <div class="inline">
            <label><input type="checkbox" name="skill" value="html"> HTML</label>
            <label><input type="checkbox" name="skill" value="css"> CSS</label>
            <label><input type="checkbox" name="skill" value="js"> JS</label>
        </div>

        <div class="inline">
            <label><input type="radio" name="edu" value="school"> Школа</label>
            <label><input type="radio" name="edu" value="university"> Вуз</label>
        </div>

        <input type="file" name="file">

        <div class="btn-group">
            <input type="submit" value="Отправить">
            <input type="reset" value="Сбросить">
        </div>
    </form>
</div>
</body>
</html>
